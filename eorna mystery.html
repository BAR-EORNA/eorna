.start-btn:active{background:#fff;color:#000;}
@keyframes bb{0%,100%{border-color:#fff;}50%{border-color:#555;}}
.title-copy{font-size:10px;color:#444;margin-top:20px;}

.exit-btn{position:fixed;top:8px;right:8px;z-index:999;background:#000;border:1px solid #fff;color:#fff;font-family:'DotGothic16',monospace;font-size:10px;padding:4px 8px;cursor:pointer;letter-spacing:1px;text-decoration:none;display:none;}
.exit-btn:active{background:#fff;color:#000;}

.game-wrap{width:100%;max-width:500px;background:#000;border:2px solid #fff;}

.memo-box{border-bottom:1px solid #fff;padding:6px 8px;flex:1;}

.cmd-list li:active{color:#fff;background:#111;}
.cmd-list li.selected{color:#ffff00;}
.cmd-list li.selected::before{content:'▶ ';}

.text-area{border-top:2px solid #fff;padding:8px 10px;min-height:90px;background:#000;}

.text-line.twist{color:#ff88ff;}
.text-line.hint{color:#88aaff;}

.next-area{border-top:1px solid #333;display:flex;justify-content:space-between;align-items:center;padding:4px 8px;}
.progress{font-size:10px;color:#555;letter-spacing:1px;}
.next-btn{background:#000;border:1px solid #fff;color:#fff;font-family:'DotGothic16',monospace;font-size:clamp(8px,2vw,11px);padding:4px 10px;cursor:pointer;letter-spacing:1px;}
.next-btn:active{background:#fff;color:#000;}
.next-btn:disabled{border-color:#444;color:#444;cursor:default;}

.ending-wrap{width:100%;max-width:500px;background:#000;border:2px solid #fff;}
.ending-hdr{background:#fff;color:#000;font-size:clamp(10px,3vw,14px);padding:4px 8px;letter-spacing:2px;text-align:center;}

.ending-body .em2{color:#aaffaa;}

let sceneIdx=0, phase='input', items=new Set(), wrongCount=0;

function startGame(){
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  document.getElementById('exitBtn').style.display='block';
  sceneIdx=0; phase='input'; items.clear(); wrongCount=0;
  renderScene();
}

function renderScene(){
  const s=scenes[sceneIdx];
  document.getElementById('charImg').src=s.img;
  document.getElementById('memoBody').innerHTML=s.memo.replace(/\n/g,'<br>');
  renderCmds(s);
  showTexts(s.text);
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('progressTxt').textContent=`手がかり ${items.size}/5`;
  phase='input';
}

function renderCmds(s){
  const ul=document.getElementById('cmdList');
  ul.innerHTML='';
  s.cmds.forEach((label,i)=>{
    const li=document.createElement('li');
    li.textContent=label;
    li.onclick=()=>{ if(phase==='input') doCmd(i); };
    ul.appendChild(li);
  });
}

function doCmd(idx){
  const s=scenes[sceneIdx];
  const lis=document.querySelectorAll('.cmd-list li');
  lis.forEach(l=>l.classList.remove('selected'));
  lis[idx].classList.add('selected');

  if(idx===s.correct){
    phase='result';
    if(s.item) items.add(s.item);
    document.getElementById('progressTxt').textContent=`手がかり ${items.size}/5`;
    showTexts([...s.text,...s.correctText]);
    document.getElementById('nextBtn').disabled=false;
    lis.forEach(l=>{ l.onclick=null; });
  } else {
    wrongCount++;
    showTexts([...s.text,{s:'',t:s.wrongText,type:'wrong'}]);
    if(wrongCount>=2){
      const area=document.getElementById('textArea');
      const d=document.createElement('div');
      d.className='text-line hint';
      d.textContent='ヒント：「'+s.cmds[s.correct]+'」を試してみよう';
      area.appendChild(d);
    }
  }
}

function onNext(){
  const s=scenes[sceneIdx];
  if(s.ending){ showEnding(); return; }
  sceneIdx++; wrongCount=0;
  if(sceneIdx>=scenes.length){ showEnding(); return; }
  renderScene();
}

function showTexts(lines){
  const area=document.getElementById('textArea');
  area.innerHTML='';
  lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='text-line'+(l.type?' '+l.type:'');
    if(l.s) d.innerHTML=`<span class="speaker">${l.s}：</span>${l.t}`;
    else d.textContent=l.t;
    area.appendChild(d);
  });
}

<hr class="ending-hr">

「木村が来たら渡せ」<br><br>
津守は信じていた。<br>
木村が必ず探しに来ると。<br>
