<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAR EORNA失踪事件</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#000;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'DotGothic16','MS Gothic',monospace;
  padding:8px;
}

/* ── タイトル ── */
.title-screen{
  width:100%;max-width:500px;
  background:#000;border:2px solid #fff;
  text-align:center;
}
.title-header{
  background:#fff;color:#000;
  font-size:clamp(10px,3vw,14px);
  padding:4px 8px;letter-spacing:1px;
}
.title-body{padding:32px 20px;}
.title-logo{
  font-size:clamp(8px,2vw,11px);
  color:#aaa;line-height:1.8;
  margin-bottom:16px;letter-spacing:1px;
}
.title-main{
  font-size:clamp(16px,5vw,26px);
  color:#fff;letter-spacing:2px;
  line-height:1.6;margin-bottom:16px;
}
.title-sub{
  font-size:clamp(10px,2.5vw,13px);
  color:#aaa;letter-spacing:2px;margin-bottom:28px;
}
.start-btn{
  background:#000;border:1px solid #fff;
  color:#fff;font-family:'DotGothic16',monospace;
  font-size:clamp(12px,3.5vw,16px);
  padding:12px 36px;cursor:pointer;letter-spacing:3px;
  animation:blink-border 1.5s ease infinite;
}
.start-btn:active{background:#fff;color:#000;}
@keyframes blink-border{
  0%,100%{border-color:#fff;}
  50%{border-color:#555;}
}
.title-copy{font-size:10px;color:#444;margin-top:20px;letter-spacing:1px;}

/* ── ゲーム画面 ── */
.game-wrap{width:100%;max-width:500px;background:#000;border:2px solid #fff;}
.game-titlebar{
  background:#fff;color:#000;
  font-size:clamp(9px,2.5vw,13px);
  padding:3px 8px;letter-spacing:1px;
}
.game-main{display:flex;background:#000;}
.char-area{width:66%;position:relative;border-right:1px solid #fff;}
.char-img{width:100%;display:block;image-rendering:pixelated;}
.side-area{width:34%;display:flex;flex-direction:column;}
.memo-box{border-bottom:1px solid #fff;padding:6px 8px;flex:1;}
.memo-title{
  font-size:clamp(8px,2vw,11px);color:#fff;letter-spacing:1px;
  border-bottom:1px solid #555;padding-bottom:3px;margin-bottom:5px;
}
.memo-body{
  font-size:clamp(7px,1.8vw,10px);color:#ccc;
  line-height:1.9;word-break:keep-all;overflow-wrap:break-word;
}
.cmd-box{padding:6px 8px;}
.cmd-title{
  font-size:clamp(8px,2vw,11px);color:#fff;letter-spacing:1px;
  border-bottom:1px solid #555;padding-bottom:3px;margin-bottom:5px;
}
.cmd-list{list-style:none;}
.cmd-list li{
  font-size:clamp(7px,1.8vw,10px);color:#888;
  line-height:2;padding:0 2px;cursor:pointer;
}
.cmd-list li.active{color:#fff;}
.cmd-list li.active::before{content:'▶ ';}
.cmd-list li:active{background:#222;}

.text-area{
  border-top:2px solid #fff;padding:8px 10px;
  min-height:90px;background:#000;
}
.text-line{
  font-size:clamp(9px,2.5vw,13px);color:#fff;
  line-height:1.9;word-break:keep-all;overflow-wrap:break-word;
}
.text-line .speaker{color:#ffff00;}
.text-line.center{text-align:center;color:#ffff00;}

.next-area{
  border-top:1px solid #333;
  display:flex;justify-content:flex-end;padding:4px 8px;
}
.next-btn{
  background:#000;border:1px solid #fff;color:#fff;
  font-family:'DotGothic16',monospace;
  font-size:clamp(8px,2vw,11px);
  padding:4px 10px;cursor:pointer;letter-spacing:1px;
}
.next-btn:active{background:#fff;color:#000;}

/* ── エンディング ── */
.ending-wrap{width:100%;max-width:500px;background:#000;border:2px solid #fff;}
.ending-header{
  background:#fff;color:#000;
  font-size:clamp(10px,3vw,14px);
  padding:4px 8px;letter-spacing:2px;text-align:center;
}
.ending-body{
  padding:20px 16px;
  font-size:clamp(10px,2.6vw,13px);
  color:#fff;line-height:2.4;word-break:keep-all;
}
.ending-body .em{color:#ffff00;}
.ending-body .em2{color:#aaffaa;}
.ending-hr{border:none;border-top:1px solid #333;margin:14px 0;}
.retry-btn{
  display:block;margin:0 auto 20px;
  background:#000;border:1px solid #fff;color:#fff;
  font-family:'DotGothic16',monospace;
  font-size:clamp(11px,3vw,14px);
  padding:10px 28px;cursor:pointer;letter-spacing:2px;
}
.retry-btn:active{background:#fff;color:#000;}
</style>
</head>
<body>

<!-- タイトル -->
<div id="titleScreen" class="title-screen">
  <div class="title-header">BAR EORNA失踪事件</div>
  <div class="title-body">
    <div class="title-logo">■ ■ ■ ■ ■ ■ ■ ■ ■ ■<br>新宿三丁目　深夜のバー<br>■ ■ ■ ■ ■ ■ ■ ■ ■ ■</div>
    <div class="title-main">BAR EORNA<br>失踪事件</div>
    <div class="title-sub">〜 新宿三丁目の夜 〜</div>
    <button class="start-btn" onclick="startGame()">ゲームスタート</button>
    <div class="title-copy">© 2026 BAR EORNA</div>
  </div>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="game-wrap" style="display:none;">
  <div class="game-titlebar">BAR EORNA失踪事件</div>
  <div class="game-main">
    <div class="char-area">
      <img id="charImg" class="char-img" src="" alt="">
    </div>
    <div class="side-area">
      <div class="memo-box">
        <div class="memo-title">ー捜査メモー</div>
        <div class="memo-body" id="memoBody"></div>
      </div>
      <div class="cmd-box">
        <div class="cmd-title">ーコマンドー</div>
        <ul class="cmd-list" id="cmdList">
          <li>はなす</li>
          <li>しらべる</li>
          <li>ひとに きく</li>
          <li>ものを みせる</li>
          <li>もちもの</li>
          <li>データ</li>
        </ul>
      </div>
    </div>
  </div>
  <div class="text-area" id="textArea"></div>
  <div class="next-area">
    <button class="next-btn" onclick="nextScene()">どのコマンドにしますか？ ▶</button>
  </div>
</div>

<!-- エンディング -->
<div id="endingScreen" class="ending-wrap" style="display:none;">
  <div class="ending-header">【 事件解決 】</div>
  <div class="ending-body" id="endingBody"></div>
  <button class="retry-btn" onclick="resetGame()">もう一度プレイ</button>
</div>

<script>
const scenes = [
  // 序章
  {

    cmd:'はなす',
    lines:[
      {s:'木村', t:'閉店後、永田から連絡が入った。'},

  },
  {

  },
  {

    lines:[
      {s:'木村', t:'「何か変わった様子はなかったか」'},
      {s:'永田', t:'「閉店前に、一本だけ電話が来ていました」'},
      {s:'永田', t:'「電話の後、兄貴の表情が変わったんです」'},
    ]
  },
  // 第1章：現場捜査
  {
    img:'IMG_3555.JPG',
    memo:'場所：カウンター\n手がかり：グラス\nメモ発見',
    cmd:'しらべる',
    lines:[
      {s:'木村', t:'カウンターを調べた。飲みかけのグラスが一つ。'},
      {s:'木村', t:'グラスの横に、小さなメモが残されていた。'},
      {s:'木村', t:'「3月15日、取引成立。相手は信用できない」'},
    ]
  },
  {
    img:'IMG_3555.JPG',
    memo:'手がかり：スマホ\n着信履歴を確認',
    cmd:'しらべる',
    lines:[
      {s:'木村', t:'津守のスマートフォンがカウンターに残されていた。'},
      {s:'木村', t:'着信履歴を見ると、最後の着信は「非通知」。'},
      {s:'木村', t:'時刻は閉店30分前。メモの取引と関係があるのか。'},
    ]
  },
  // 第2章：取引の調査
  {
    img:'IMG_3555.JPG',
    memo:'新事実：不動産取引\n明日が契約日',
    cmd:'データ',
    lines:[
      {s:'木村', t:'津守の手帳を確認した。'},
      {s:'木村', t:'明日、大きな不動産取引の契約が入っていた。'},
      {s:'木村', t:'取引相手の名前は…消されていた。'},
    ]
  },
  {
    img:'43FD7881-A9C3-4711-B9DE-9511A0F963C8.png',
    memo:'人物：永田\n新たな証言',
    cmd:'ひとに きく',
    lines:[
      {s:'木村', t:'永田に取引のことを聞いた。'},
      {s:'永田', t:'「最近、兄貴よく悩んでいました」'},
      {s:'永田', t:'「ある取引を断りたいが、断れない、と」'},
    ]
  },
  {
    img:'43FD7881-A9C3-4711-B9DE-9511A0F963C8.png',
    memo:'人物：永田\n重要証言',
    cmd:'ひとに きく',
    lines:[
      {s:'永田', t:'「一週間前、見知らぬ男が兄貴を訪ねてきました」'},
      {s:'永田', t:'「二人は小声で話していて、兄貴が青ざめていた」'},
      {s:'木村', t:'「その男の特徴は」'},
    ]
  },
  {
    img:'43FD7881-A9C3-4711-B9DE-9511A0F963C8.png',
    memo:'人物：謎の男\n特徴メモ',
    cmd:'ひとに きく',
    lines:[
      {s:'永田', t:'「40代くらいで、高級そうなスーツを着ていました」'},
      {s:'永田', t:'「名刺を置いていきましたが、兄貴がすぐ捨てて」'},
      {s:'木村', t:'「ゴミ箱を調べよう」'},
    ]
  },
  // 第3章：名刺の謎
  {
    img:'IMG_3555.JPG',
    memo:'手がかり：名刺\nゴミ箱から発見',
    cmd:'しらべる',
    lines:[
      {s:'木村', t:'ゴミ箱の底から、破かれた名刺の断片が出てきた。'},
      {s:'木村', t:'「……不動産……代表取締役……」'},

    ]
  },
  {
    img:'IMG_3555.JPG',
    memo:'推理：取引の全貌\nが見えてきた',

      {s:'木村', t:'整理しよう。津守は不動産取引を迫られていた。'},

      {s:'木村', t:'そして非通知の電話の後、自ら姿を消した。'},
    ]
  },
  {
    img:'IMG_3555.JPG',
    memo:'結論：自ら身を隠した\n理由は取引回避か',
    cmd:'すいり',
    lines:[
      {s:'木村', t:'津守は殺されたのではない。'},
      {s:'木村', t:'自分から消えることで、取引から逃げたんだ。'},
      {s:'木村', t:'でも…なぜスマホを残した？'},
    ]
  },
  // 終章
  {
    img:'43FD7881-A9C3-4711-B9DE-9511A0F963C8.png',
    memo:'終章：EORNAにて\n木村と永田',
    cmd:'はなす',
    lines:[
      {s:'木村', t:'「永田、津守から何か預かっていないか」'},
      {s:'永田', t:'「…実は」'},
      {s:'永田', t:'「出て行く前に、封筒を渡されました」'},
    ]
  },
  {
    img:'43FD7881-A9C3-4711-B9DE-9511A0F963C8.png',
    memo:'封筒の内容\n津守からの手紙',
    cmd:'ものを みせる',
    lines:[
      {s:'永田', t:'「木村さんに、頃合いを見て渡してくれと」'},
      {s:'木村', t:'封筒を開けた。手紙が一枚。'},
      {s:'木村', t:'「木村へ。心配をかけてすまない。しばらく姿を消す」'},
    ]
  },
  {
    img:'52350031-F030-461B-9EC5-BE77B893323B.png',
    memo:'津守からの手紙\n真相が明かされる',
    cmd:'ものを みせる',
    lines:[
      {s:'津守', t:'「ある取引を断るために、俺は一時的に消える必要があった」'},
      {s:'津守', t:'「スマホを残したのは、追跡されないためだ」'},
      {s:'津守', t:'「落ち着いたら、またEORNAで一杯やろう。　津守」'},
    ]
  },
  {
    img:'IMG_3555.JPG',
    memo:'事件解決\nEORNAの夜',
    cmd:'はなす',
    lines:[
      {s:'木村', t:'手紙を読み終えて、俺は少し笑った。'},
      {s:'永田', t:'「兄貴、大丈夫ですかね」'},
      {s:'木村', t:'「ああ。あいつは強い。必ず戻ってくる」'},
    ]
  },
  {
    img:'IMG_3555.JPG',
    memo:'エピローグ\n数週間後',
    cmd:'はなす',
    lines:[
      {s:'木村', t:'数週間後、EORNAのドアが静かに開いた。'},
      {s:'津守', t:'「やあ、木村。ウイスキーを一杯くれないか」'},
      {s:'木村', t:'「おかえり、津守」'},
    ], ending:true
  },
];

let sceneIdx=0, lineIdx=0;

function startGame(){
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  sceneIdx=0; lineIdx=0;
  renderScene();
}

function renderScene(){
  const s=scenes[sceneIdx];
  document.getElementById('charImg').src=s.img;
  document.getElementById('memoBody').innerHTML=s.memo.replace(/\n/g,'<br>');
  const items=document.querySelectorAll('.cmd-list li');
  const cmds=['はなす','しらべる','ひとに きく','ものを みせる','もちもの','データ'];
  // すいり対応
  const activeCmd = s.cmd==='すいり' ? 'はなす' : s.cmd;
  items.forEach((li,i)=>{
    const match = s.cmd==='すいり' ? i===0 : cmds[i]===s.cmd;
    li.classList.toggle('active', match);
    li.textContent = i===0 && s.cmd==='すいり' ? 'すいり　しろ' : cmds[i];
  });
  renderLines();
}

function renderLines(){
  const s=scenes[sceneIdx];
  const area=document.getElementById('textArea');
  area.innerHTML='';
  const start=Math.max(0,lineIdx-2);
  for(let i=start;i<=lineIdx&&i<s.lines.length;i++){
    const l=s.lines[i];
    const d=document.createElement('div');
    if(!l.s){
      d.className='text-line center';
      d.textContent=l.t;
    } else {
      d.className='text-line';
      d.innerHTML=`<span class="speaker">${l.s}：</span>${l.t}`;
    }
    area.appendChild(d);
  }
}

function nextScene(){
  const s=scenes[sceneIdx];
  if(lineIdx<s.lines.length-1){ lineIdx++; renderLines(); return; }
  if(s.ending){ showEnding(); return; }
  sceneIdx++; lineIdx=0;
  if(sceneIdx>=scenes.length){ showEnding(); return; }
  renderScene();
}

function showEnding(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endingScreen').style.display='block';
  document.getElementById('endingBody').innerHTML=`
<span class="em">BAR EORNA失踪事件　解決</span><br><br>
津守は自らの意志で姿を消した。<br>
不当な取引を迫る相手から逃れるため、<br>
スマホを残し、誰にも告げずEORNAを出た。<br>
<hr class="ending-hr">
永田は兄貴から手紙を預かっていた。<br>
「頃合いを見て渡してくれ」<br>
その言葉を守り、黙っていた。<br>
<hr class="ending-hr">
数週間後、津守はEORNAに戻った。<br><br>
<span class="em2">カウンターには、いつものウイスキーが待っていた。</span>
  `;
}

function resetGame(){
  sceneIdx=0; lineIdx=0;
  document.getElementById('endingScreen').style.display='none';
  document.getElementById('titleScreen').style.display='block';
}
</script>
</body>
</html>
