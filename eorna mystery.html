let cleared = [];
let currentChapter=0, sceneIdx=0, phase='input', items=new Set(), wrongCount=0;

function showChapterSelect(){
  ['titleScreen','gameScreen','endingScreen'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.getElementById('exitBtn').style.display='none';
  const screen=document.getElementById('chapterScreen');
  screen.style.display='block';
  const list=document.getElementById('chapterList');
  list.innerHTML='';
  chapters.forEach((ch,i)=>{
    const isCleared=cleared.includes(i);
    const isLocked=i>0&&!cleared.includes(i-1);
    const div=document.createElement('div');
    div.className='chapter-item'+(isCleared?' cleared':'')+(isLocked?' locked':'');
    div.innerHTML=`<span class="chapter-num">${String(i+1).padStart(2,'0')}</span><span class="chapter-title">${ch.title}${isCleared?' ✓':''}</span>`;
    if(!isLocked) div.onclick=()=>startChapter(i);
    list.appendChild(div);
  });
}

function startChapter(idx){
  currentChapter=idx; sceneIdx=0; phase='input'; items.clear(); wrongCount=0;
  document.getElementById('chapterScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  document.getElementById('exitBtn').style.display='block';
  document.getElementById('gameTitleBar').textContent=chapters[idx].title;
  renderScene();
}

function renderScene(){
  const s=chapters[currentChapter].scenes[sceneIdx];
  document.getElementById('charImg').src=s.img;
  document.getElementById('memoBody').innerHTML=s.memo.replace(/\n/g,'<br>');
  const ul=document.getElementById('cmdList');
  ul.innerHTML='';
  s.cmds.forEach((label,i)=>{
    const li=document.createElement('li');
    li.textContent=label;
    li.onclick=()=>{ if(phase==='input') doCmd(i); };
    ul.appendChild(li);
  });
  showTexts(s.text);
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('progressTxt').textContent=`手がかり ${items.size}`;
  phase='input';
}

function doCmd(idx){
  const s=chapters[currentChapter].scenes[sceneIdx];
  const lis=document.querySelectorAll('.cmd-list li');
  lis.forEach(l=>l.classList.remove('selected'));
  lis[idx].classList.add('selected');
  if(idx===s.correct){
    phase='result';
    if(s.item) items.add(s.item);
    document.getElementById('progressTxt').textContent=`手がかり ${items.size}`;
    showTexts([...s.text,...s.correctText]);
    document.getElementById('nextBtn').disabled=false;
    lis.forEach(l=>{ l.onclick=null; });
  } else {
    wrongCount++;
    showTexts([...s.text,{s:'',t:s.wrongText,type:'wrong'}]);
    if(wrongCount>=2){
      const area=document.getElementById('textArea');
      const d=document.createElement('div');
      d.className='text-line hint';
      d.textContent='ヒント：「'+s.cmds[s.correct]+'」を試してみよう';
      area.appendChild(d);
    }
  }
}

function onNext(){
  const ch=chapters[currentChapter];
  const s=ch.scenes[sceneIdx];
  if(s.ending){ showEnding(ch); return; }
  sceneIdx++; wrongCount=0;
  if(sceneIdx>=ch.scenes.length){ showEnding(ch); return; }
  renderScene();
}

function showTexts(lines){
  const area=document.getElementById('textArea');
  area.innerHTML='';
  lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='text-line'+(l.type?' '+l.type:'');
    if(l.s) d.innerHTML=`<span class="speaker">${l.s}：</span>${l.t}`;
    else d.textContent=l.t;
    area.appendChild(d);
  });
}

function showEnding(ch){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('exitBtn').style.display='none';
  document.getElementById('endingScreen').style.display='block';
  document.getElementById('endingHdr').textContent=ch.ending.title;
  document.getElementById('endingBody').innerHTML=ch.ending.body;
  if(!cleared.includes(currentChapter)) cleared.push(currentChapter);
}

function resetGame(){
  document.getElementById('endingScreen').style.display='none';
  document.getElementById('titleScreen').style.display='block';
}
