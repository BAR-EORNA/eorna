<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAR EORNA失踪事件</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DotGothic16','MS Gothic',monospace;padding:8px;}

.exit-btn{position:fixed;top:8px;right:8px;z-index:999;background:#000;border:1px solid #fff;color:#fff;font-family:'DotGothic16',monospace;font-size:10px;padding:4px 8px;cursor:pointer;letter-spacing:1px;text-decoration:none;display:none;}
.exit-btn:active{background:#fff;color:#000;}

/* タイトル */
.title-screen{width:100%;max-width:500px;background:#000;border:2px solid #fff;text-align:center;}
.hdr{background:#fff;color:#000;font-size:clamp(10px,3vw,14px);padding:4px 8px;letter-spacing:1px;}
.title-body{padding:32px 20px;}
.title-logo{font-size:clamp(8px,2vw,11px);color:#aaa;line-height:1.8;margin-bottom:16px;}
.title-main{font-size:clamp(16px,5vw,26px);color:#fff;letter-spacing:2px;line-height:1.6;margin-bottom:16px;}
.title-sub{font-size:clamp(10px,2.5vw,13px);color:#aaa;letter-spacing:2px;margin-bottom:28px;}
.start-btn{background:#000;border:1px solid #fff;color:#fff;font-family:'DotGothic16',monospace;font-size:clamp(12px,3.5vw,16px);padding:12px 36px;cursor:pointer;letter-spacing:3px;animation:bb 1.5s ease infinite;}
.start-btn:active{background:#fff;color:#000;}
@keyframes bb{0%,100%{border-color:#fff;}50%{border-color:#555;}}
.title-copy{font-size:10px;color:#444;margin-top:20px;}

/* チャプター選択 */
.chapter-screen{width:100%;max-width:500px;background:#000;border:2px solid #fff;}
.chapter-list{padding:16px;}
.chapter-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #222;cursor:pointer;}
.chapter-item:active{background:#111;}
.chapter-item.locked{opacity:0.3;cursor:default;}
.chapter-num{font-size:11px;color:#555;letter-spacing:1px;min-width:40px;}
.chapter-title{font-size:clamp(10px,2.8vw,13px);color:#fff;}
.chapter-item.cleared .chapter-title{color:#aaffaa;}
.chapter-item.cleared .chapter-num{color:#aaffaa;}

/* ゲーム */
.game-wrap{width:100%;max-width:500px;background:#000;border:2px solid #fff;}
.game-titlebar{background:#fff;color:#000;font-size:clamp(9px,2.5vw,13px);padding:3px 8px;letter-spacing:1px;}
.game-main{display:flex;background:#000;}
.char-area{width:66%;border-right:1px solid #fff;}
.char-img{width:100%;display:block;image-rendering:pixelated;}
.side-area{width:34%;display:flex;flex-direction:column;}
.memo-box{border-bottom:1px solid #fff;padding:6px 8px;flex:1;}
.memo-title{font-size:clamp(8px,2vw,11px);color:#fff;letter-spacing:1px;border-bottom:1px solid #555;padding-bottom:3px;margin-bottom:5px;}
.memo-body{font-size:clamp(7px,1.8vw,10px);color:#ccc;line-height:1.9;word-break:keep-all;overflow-wrap:break-word;}
.cmd-box{padding:6px 8px;}
.cmd-title{font-size:clamp(8px,2vw,11px);color:#fff;letter-spacing:1px;border-bottom:1px solid #555;padding-bottom:3px;margin-bottom:5px;}
.cmd-list{list-style:none;}
.cmd-list li{font-size:clamp(7px,1.8vw,11px);color:#aaa;line-height:2.2;padding:0 2px;cursor:pointer;}
.cmd-list li:active{color:#fff;background:#111;}
.cmd-list li.selected{color:#ffff00;}
.cmd-list li.selected::before{content:'▶ ';}

.text-area{border-top:2px solid #fff;padding:8px 10px;min-height:90px;background:#000;}
.text-line{font-size:clamp(9px,2.5vw,13px);color:#fff;line-height:1.9;word-break:keep-all;overflow-wrap:break-word;}
.text-line .speaker{color:#ffff00;}
.text-line.wrong{color:#ff6666;}
.text-line.ok{color:#aaffaa;}
.text-line.twist{color:#ff88ff;}
.text-line.hint{color:#88aaff;}
.text-line.silent{color:#888;font-style:italic;}

.next-area{border-top:1px solid #333;display:flex;justify-content:space-between;align-items:center;padding:4px 8px;}
.progress{font-size:10px;color:#555;letter-spacing:1px;}
.next-btn{background:#000;border:1px solid #fff;color:#fff;font-family:'DotGothic16',monospace;font-size:clamp(8px,2vw,11px);padding:4px 10px;cursor:pointer;letter-spacing:1px;}
.next-btn:active{background:#fff;color:#000;}
.next-btn:disabled{border-color:#444;color:#444;cursor:default;}

/* エンディング */
.ending-wrap{width:100%;max-width:500px;background:#000;border:2px solid #fff;}
.ending-hdr{background:#fff;color:#000;font-size:clamp(10px,3vw,14px);padding:4px 8px;letter-spacing:2px;text-align:center;}
.ending-body{padding:20px 16px;font-size:clamp(10px,2.6vw,13px);color:#fff;line-height:2.4;word-break:keep-all;}
.ending-body .em{color:#ffff00;}
.ending-body .em2{color:#aaffaa;}
.ending-body .em3{color:#ff88ff;}
.ending-hr{border:none;border-top:1px solid #333;margin:14px 0;}
.ending-btns{display:flex;gap:8px;padding:0 16px 20px;}
.ending-btn{flex:1;background:#000;border:1px solid #fff;color:#fff;font-family:'DotGothic16',monospace;font-size:clamp(9px,2.5vw,12px);padding:10px 8px;cursor:pointer;letter-spacing:1px;text-align:center;}
.ending-btn:active{background:#fff;color:#000;}
</style>
</head>
<body>

<a id="exitBtn" class="exit-btn" href="https://eorna.info">× 終了</a>

<!-- タイトル -->
<div id="titleScreen" class="title-screen">
  <div class="hdr">BAR EORNA失踪事件</div>
  <div class="title-body">
    <div class="title-logo">■ ■ ■ ■ ■ ■ ■ ■ ■ ■<br>新宿三丁目　深夜のバー<br>■ ■ ■ ■ ■ ■ ■ ■ ■ ■</div>

    <button class="start-btn" onclick="startChapter(0)">はじめから</button>
    <div style="height:12px"></div>

    <div class="title-copy">© 2026 BAR EORNA</div>
  </div>
</div>

<!-- チャプター選択 -->
<div id="chapterScreen" class="chapter-screen" style="display:none;">
  <div class="hdr">チャプター選択</div>
  <div class="chapter-list" id="chapterList"></div>
</div>

<!-- ゲーム -->
<div id="gameScreen" class="game-wrap" style="display:none;">
  <div class="game-titlebar" id="gameTitleBar">BAR EORNA失踪事件</div>
  <div class="game-main">
    <div class="char-area"><img id="charImg" class="char-img" src="" alt=""></div>
    <div class="side-area">
      <div class="memo-box">
        <div class="memo-title">ー捜査メモー</div>
        <div class="memo-body" id="memoBody"></div>
      </div>
      <div class="cmd-box">

        <ul class="cmd-list" id="cmdList"></ul>
      </div>
    </div>
  </div>
  <div class="text-area" id="textArea"></div>
  <div class="next-area">
    <span class="progress" id="progressTxt"></span>
    <button class="next-btn" id="nextBtn" onclick="onNext()" disabled>つぎへ ▶</button>
  </div>
</div>

<!-- エンディング -->
<div id="endingScreen" class="ending-wrap" style="display:none;">
  <div class="ending-hdr" id="endingHdr"></div>
  <div class="ending-body" id="endingBody"></div>
  <div class="ending-btns">
    <button class="ending-btn" onclick="showChapterSelect()">チャプター選択</button>
    <button class="ending-btn" onclick="resetGame()">タイトルへ</button>
  </div>
</div>

// セーブデータ（チャプタークリア状況）
let cleared = [];

let currentChapter=0, sceneIdx=0, phase='input', items=new Set(), wrongCount=0;

function showChapterSelect(){
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('endingScreen').style.display='none';
  document.getElementById('exitBtn').style.display='none';
  const screen=document.getElementById('chapterScreen');
  screen.style.display='block';
  const list=document.getElementById('chapterList');
  list.innerHTML='';
  chapters.forEach((ch,i)=>{
    const div=document.createElement('div');
    const isCleared=cleared.includes(i);
    const isLocked=i>0&&!cleared.includes(i-1);
    div.className='chapter-item'+(isCleared?' cleared':'')+(isLocked?' locked':'');
    div.innerHTML=`<span class="chapter-num">${String(i+1).padStart(2,'0')}</span><span class="chapter-title">${ch.title}${isCleared?' ✓':''}</span>`;
    if(!isLocked) div.onclick=()=>startChapter(i);
    list.appendChild(div);
  });
}

function startChapter(idx){
  currentChapter=idx; sceneIdx=0; phase='input'; items.clear(); wrongCount=0;
  document.getElementById('chapterScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  document.getElementById('exitBtn').style.display='block';
  document.getElementById('gameTitleBar').textContent=chapters[idx].title;
  renderScene();
}

function renderScene(){
  const s=chapters[currentChapter].scenes[sceneIdx];
  document.getElementById('charImg').src=s.img;
  document.getElementById('memoBody').innerHTML=s.memo.replace(/\n/g,'<br>');
  renderCmds(s);
  showTexts(s.text);
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('progressTxt').textContent=`手がかり ${items.size}`;
  phase='input';
}

function renderCmds(s){
  const ul=document.getElementById('cmdList');
  ul.innerHTML='';
  s.cmds.forEach((label,i)=>{
    const li=document.createElement('li');
    li.textContent=label;
    li.onclick=()=>{ if(phase==='input') doCmd(i); };
    ul.appendChild(li);
  });
}

function doCmd(idx){
  const s=chapters[currentChapter].scenes[sceneIdx];
  const lis=document.querySelectorAll('.cmd-list li');
  lis.forEach(l=>l.classList.remove('selected'));
  lis[idx].classList.add('selected');
  if(idx===s.correct){
    phase='result';
    if(s.item) items.add(s.item);
    document.getElementById('progressTxt').textContent=`手がかり ${items.size}`;
    showTexts([...s.text,...s.correctText]);
    document.getElementById('nextBtn').disabled=false;
    lis.forEach(l=>{ l.onclick=null; });
  } else {
    wrongCount++;
    showTexts([...s.text,{s:'',t:s.wrongText,type:'wrong'}]);
    if(wrongCount>=2){
      const area=document.getElementById('textArea');
      const d=document.createElement('div');
      d.className='text-line hint';
      d.textContent='ヒント：「'+s.cmds[s.correct]+'」を試してみよう';
      area.appendChild(d);
    }
  }
}

function onNext(){
  const ch=chapters[currentChapter];
  const s=ch.scenes[sceneIdx];
  if(s.ending){ showEnding(ch); return; }
  sceneIdx++;
  wrongCount=0;
  if(sceneIdx>=ch.scenes.length){ showEnding(ch); return; }
  renderScene();
}

function showTexts(lines){
  const area=document.getElementById('textArea');
  area.innerHTML='';
  lines.forEach(l=>{
    const d=document.createElement('div');
    d.className='text-line'+(l.type?' '+l.type:'');
    if(l.s) d.innerHTML=`<span class="speaker">${l.s}：</span>${l.t}`;
    else d.textContent=l.t;
    area.appendChild(d);
  });
}

function showEnding(ch){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('exitBtn').style.display='none';
  document.getElementById('endingScreen').style.display='block';
  document.getElementById('endingHdr').textContent=ch.ending.title;
  document.getElementById('endingBody').innerHTML=ch.ending.body;
  if(!cleared.includes(currentChapter)){
    cleared.push(currentChapter);
    // save disabled
  }
}

function resetGame(){
  document.getElementById('endingScreen').style.display='none';
  document.getElementById('titleScreen').style.display='block';
}

function startGame(){
  showChapterSelect();
}
